name: Fragrance trends collector

# Runs DAILY at 07:17 UTC, and on demand.
#
# Why daily, and why :17 — it used to be "0 6 * * 1" (Mondays on the hour) and
# only landed every other week. Two reasons:
#   1. Google Trends (our only working source) gets rate-limited from GitHub's
#      shared runner IPs. When every source comes back empty the collector exits
#      1, the job fails, and nothing is committed. Weekly, one 429 cost a whole
#      week of freshness.
#   2. GitHub delays or drops scheduled runs under load, and the top of the hour
#      is the most congested slot.
# Running daily off-the-hour means a single failure costs a day, not a fortnight.
# The commit step is a no-op when nothing changed, so extra runs are ~free.
on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-trends
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: trends-collector/requirements.txt

      - name: Install collector deps
        run: pip install -r trends-collector/requirements.txt

      - name: Run collector
        working-directory: trends-collector
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        # Internal snapshots + history stay in trends-collector/data (week-over-week
        # deltas read the prior file from here). --top caps the feed size.
        run: python -m collector.main --config config.yaml --out data --top 50

      - name: Publish feeds to app data/
        run: cp trends-collector/data/trending-*.json data/

      - name: Commit snapshot
        run: |
          git config user.name  "spritz-trends-bot"
          git config user.email "actions@github.com"
          git add data/trending-*.json trends-collector/data
          if git diff --cached --quiet; then
            echo "No changes today."
          else
            git commit -m "data: fragrance trends $(date -u +%F)"
            git push
          fi
